specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: GameItems
    network: arbitrum-sepolia
    source:
      address: "0x477BE3c4616cbcFa89aEfb73054a71a1C462EFBC"
      abi: GameItems
      startBlock: 269102776
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Player
        - ItemBalance
        - CraftEvent
      abis:
        - name: GameItems
          file: ./abis/GameItems.json
      eventHandlers:
        - event: TransferSingle(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleTransferSingle
        - event: CraftCompleted(indexed address,indexed uint256,uint256)
          handler: handleCraftCompleted
      file: ./src/mapping.ts
  - kind: ethereum
    name: ResourceAMM
    network: arbitrum-sepolia
    source:
      address: "0x41ec899826C7d9619CCF06faa60af716fDF8A2C0"
      abi: ResourceAMM
      startBlock: 269102788
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Swap
        - LiquidityEvent
      abis:
        - name: ResourceAMM
          file: ./abis/ResourceAMM.json
      eventHandlers:
        - event: Swap(indexed address,indexed address,uint256,uint256)
          handler: handleSwap
        - event: LiquidityAdded(indexed address,uint256,uint256,uint256)
          handler: handleLiquidityAdded
      file: ./src/mapping.ts